syntax = "proto3";
package brezel.policy;

import "common.proto";
import "google/protobuf/timestamp.proto";

service PolicyService {
    rpc ReplaceRuntimeRules(ReplaceRuntimeRulesRequest) returns (ReplaceRuntimeRulesResponse);
    rpc GetApplyStatus(GetApplyStatusRequest) returns (GetApplyStatusResponse);
}

enum ApplyState {
    APPLY_STATE_UNSPECIFIED = 0;
    APPLY_STATE_APPLIED = 1;
    APPLY_STATE_REJECTED = 2;
    APPLY_STATE_IN_PROGRESS = 3;
}

// RuntimeRule is intentionally narrow: each rule must map directly to the
// current exact-match eBPF denylist maps without extra compilation steps.
message RuntimeRule {
    string id = 1;

    oneof matcher {
        // IPv4 encoded as a uint32 in network-byte-order form.
        uint32 src_ip = 2;
        // IPv4 encoded as a uint32 in network-byte-order form.
        uint32 dst_ip = 3;
        uint32 src_port = 4;
        uint32 dst_port = 5;
        uint32 protocol = 6;
        brezel.common.FlowKey flow = 7;
    }
}

// ReplaceRuntimeRules uses a double-buffered bank flip. Zashchita prepares the
// inactive eBPF denylist bank, then flips one active-bank pointer when the new
// bank is ready. applied_version only advances after that flip succeeds.
message ReplaceRuntimeRulesRequest {
    string version = 1;
    google.protobuf.Timestamp generated_at = 2;
    repeated RuntimeRule rules = 3;
}

message ReplaceRuntimeRulesResponse {
    bool success = 1;
    string message = 2;
    string applied_version = 3;
    uint32 applied_rule_count = 4;
    ApplyState state = 5;
    google.protobuf.Timestamp applied_at = 6;
}

message GetApplyStatusRequest {}

// applied_version is the last version whose inactive bank preparation and final
// ACTIVE_POLICY_BANK flip both succeeded.
message GetApplyStatusResponse {
    string applied_version = 1;
    uint32 applied_rule_count = 2;
    ApplyState state = 3;
    string message = 4;
    google.protobuf.Timestamp applied_at = 5;
}
